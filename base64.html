<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64编解码</title>
    <link rel="icon" href="assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: "Public Sans", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        @media (max-width: 768px) {
            .panel-wrapper {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            padding: 12px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .panel-left {
            border-right: 1px solid #e0e0e0;
        }

        @media (max-width: 768px) {
            .panel-left {
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
            }
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .panel-title::before {
            content: '';
            width: 4px;
            height: 14px;
            background: #667eea;
            border-radius: 2px;
        }

        .text-input {
            width: 100%;
            height: 100%;
            min-width: 0;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 13px;
            resize: none;
            transition: border-color 0.3s ease;
            overflow: auto;
        }

        .text-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd6;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .btn-success:hover {
            background: #43a047;
        }

        .btn-danger {
            background: #EA5455;
            color: white;
        }

        .btn-danger:hover {
            background: #d73a3a;
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-clear, .btn-copy {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 10;
        }

        .btn-clear:hover, .btn-copy:hover {
            background: #f0f0f0;
            color: #666;
        }

        .btn-copy {
            right: 45px;
        }

        #outputContainer {
            flex: 1;
            height: 100%;
            overflow: auto;
            background: #f9f9f9;
            border-radius: 8px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            min-width: 0;
            max-width: 100%;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            box-sizing: border-box;
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .error-message.show {
            display: block;
        }

        .success-hint {
            margin-top: 10px;
            padding: 10px;
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
            color: #2e7d32;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }

        .success-hint.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 60px 20px;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .action-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        @media (max-width: 768px) {
            .action-cards {
                grid-template-columns: 1fr;
            }
        }

        .action-card {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .action-card h3 {
            font-size: 13px;
            color: #333;
            margin-bottom: 6px;
        }

        .action-card p {
            font-size: 11px;
            color: #999;
            margin-bottom: 8px;
        }

        .action-card .btn {
            width: 100%;
            font-size: 12px;
            padding: 6px 10px;
        }

        .info-bar {
            display: flex;
            gap: 16px;
            padding: 8px 12px;
            background: #f5f5f5;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 12px;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #666;
        }

        .info-item strong {
            color: #333;
        }

        .file-input-wrapper {
            margin-top: 8px;
        }

        .file-input-wrapper label {
            display: inline-block;
            padding: 6px 12px;
            background: #f0f4ff;
            color: #667eea;
            border: 1px solid #d0d8ff;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .file-input-wrapper label:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .file-name {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel-wrapper">
            <div class="panel panel-left">
                <div class="panel-title">
                    输入
                    <span id="errorHint"
                          style="color: #EA5455; font-size: 12px; font-weight: normal; margin-left: 8px; display: none;"></span>
                    <span id="successHint"
                          style="color: #4caf50; font-size: 12px; font-weight: normal; margin-left: 8px; display: none;"></span>
                </div>
                <button class="btn-clear" onclick="clearInput()" title="清空">✕</button>
                <button class="btn-copy" onclick="copyInput()" title="复制">📋</button>
                <textarea
                        id="base64Input"
                        class="text-input"
                        placeholder="请输入文本或Base64字符串..."
                ></textarea>
                <div class="file-input-wrapper">
                    <label for="fileInput">
                        📁 选择文件（自动Base64编码）
                    </label>
                    <input type="file" id="fileInput" onchange="handleFileSelect(event)">
                    <div class="file-name" id="fileName"></div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">
                    输出
                    <span id="infoBar" class="info-bar"
                          style="display: none; margin-left: 8px; border: none; padding: 0; background: none; font-size: 12px;"></span>
                </div>
                <button class="btn-copy" onclick="copyOutput()" title="复制结果">📋</button>
                <div id="outputContainer">
                    <div class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <p>请在左侧输入内容<br>选择相应功能按钮进行处理</p>
                    </div>
                </div>
            </div>
        </div>

        <div style="padding: 12px; border-top: 1px solid #e0e0e0; flex-shrink: 0;">
            <div class="button-group">
                <button class="btn btn-primary" onclick="encodeBase64()">
                    <span>🔒</span> 编码为Base64
                </button>
                <button class="btn btn-secondary" onclick="decodeBase64()">
                    <span>🔓</span> 解码Base64
                </button>
                <button class="btn btn-success" onclick="copyOutput()">
                    <span>📋</span> 复制结果
                </button>
                <button class="btn btn-danger" onclick="clearInput()">
                    <span>🗑️</span> 清空
                </button>
            </div>
        </div>
    </div>

    <script>
        function showError(message) {
            const errorHint = document.getElementById('errorHint');
            const successHint = document.getElementById('successHint');
            const outputContainer = document.getElementById('outputContainer');
            const infoBar = document.getElementById('infoBar');

            errorHint.textContent = message;
            errorHint.style.display = 'inline';
            successHint.style.display = 'none';
            infoBar.style.display = 'none';

            outputContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">⚠️</div>
                    <p>处理失败<br>${escapeHtml(message)}</p>
                </div>
            `;
        }

        function showSuccess(message) {
            const successHint = document.getElementById('successHint');
            const errorHint = document.getElementById('errorHint');
            errorHint.style.display = 'none';
            successHint.textContent = message;
            successHint.style.display = 'inline';
        }

        function updateOutput(result, info) {
            const outputContainer = document.getElementById('outputContainer');
            const infoBar = document.getElementById('infoBar');

            outputContainer.innerHTML = `<div style="white-space: pre-wrap; word-break: break-all;">${escapeHtml(result)}</div>`;

            if (info) {
                infoBar.style.display = 'inline';
                infoBar.innerHTML = `<span style="color: #666;">${info}</span>`;
            }
        }

        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function encodeBase64() {
            const input = document.getElementById('base64Input').value;

            if (!input.trim()) {
                showError('请输入需要编码的内容');
                return;
            }

            try {
                const encoded = btoa(unescape(encodeURIComponent(input)));
                updateOutput(encoded, `原文 ${input.length} 字符 → Base64 ${encoded.length} 字符`);
                showSuccess('✅ 编码成功！');
            } catch (e) {
                showError('编码失败：' + e.message);
            }
        }

        function decodeBase64() {
            const input = document.getElementById('base64Input').value.trim();

            if (!input) {
                showError('请输入需要解码的Base64字符串');
                return;
            }

            try {
                const decoded = decodeURIComponent(escape(atob(input)));
                updateOutput(decoded, `Base64 ${input.length} 字符 → 解码 ${decoded.length} 字符`);
                showSuccess('✅ 解码成功！');
            } catch (e) {
                showError('解码失败：无效的Base64字符串');
            }
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('fileName').textContent = `已选择: ${file.name} (${formatFileSize(file.size)})`;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64 = e.target.result;
                document.getElementById('base64Input').value = base64;
                updateOutput(base64, `文件 ${formatFileSize(file.size)}`);
                showSuccess('✅ 文件已转为Base64！');
            };
            reader.onerror = function() {
                showError('文件读取失败');
            };
            reader.readAsDataURL(file);
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function clearInput() {
            document.getElementById('base64Input').value = '';
            document.getElementById('outputContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📦</div>
                    <p>请在左侧输入内容<br>选择相应功能按钮进行处理</p>
                </div>
            `;
            document.getElementById('infoBar').style.display = 'none';
            document.getElementById('errorHint').style.display = 'none';
            document.getElementById('successHint').style.display = 'none';
            document.getElementById('fileName').textContent = '';
            document.getElementById('fileInput').value = '';
        }

        function copyInput() {
            const text = document.getElementById('base64Input').value;

            if (!text) {
                showError('没有可复制的内容');
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                showSuccess('已复制到剪贴板');
            }).catch(err => {
                showError('复制失败：' + err.message);
            });
        }

        function copyOutput() {
            const output = document.getElementById('outputContainer').textContent;

            if (!output || output.includes('请在左侧输入') || output.includes('处理失败')) {
                showError('没有可复制的结果');
                return;
            }

            navigator.clipboard.writeText(output).then(() => {
                showSuccess('结果已复制到剪贴板');
            }).catch(err => {
                showError('复制失败：' + err.message);
            });
        }

        let debounceTimer;
        document.getElementById('base64Input').addEventListener('input', function () {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(function () {
                const input = document.getElementById('base64Input').value.trim();
                if (!input) return;

                // Auto-detect: if valid base64 and not valid UTF-8 text, try decode
                // Otherwise try encode
                try {
                    // Check if it looks like base64
                    if (/^[A-Za-z0-9+/]+=*$/.test(input) && input.length % 4 === 0) {
                        try {
                            decodeBase64();
                            return;
                        } catch (e) {
                            // Not valid base64, try encode
                        }
                    }
                    encodeBase64();
                } catch (e) {
                    // Invalid input, do nothing
                }
            }, 500);
        });

        document.getElementById('base64Input').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                encodeBase64();
            }
        });
    </script>
</body>
</html>
